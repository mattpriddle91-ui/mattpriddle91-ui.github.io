<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospiscare Choir</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Playfair Display (headings) + Montserrat (body) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff; /* White banner area */
            font-family: 'Montserrat', sans-serif;
            color: #222;
            text-align: center;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .logo {
            width: 220px;
            margin-bottom: 1.5rem;
        }

        .cheque {
            width: 100%;
            max-width: 600px;
            margin: 2rem auto;
            border-radius: 10px;
        }

        .donation {
            width: 100%;
            max-width: 600px;
            margin: 2rem auto;
            border-radius: 10px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 0.2rem;
            color: #222;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 1rem;
            color: #222;
        }

        .blue-section {
            background: #7FDBFF; /* Poster blue */
            padding: 2rem 1.5rem;
            border-radius: 12px;
            margin-top: 2rem;
        }

        .tagline {
            font-weight: 600;
            font-size: 1.3rem;
            margin-bottom: 2rem;
        }

        p {
            font-size: 1.05rem;
            margin-bottom: 1.2rem;
        }

        .contact-box {
            background: rgba(255, 255, 255, 0.7);
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 2.5rem;
        }
